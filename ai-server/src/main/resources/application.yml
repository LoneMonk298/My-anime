server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: anime-record-server
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:anime_record_site}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:ai_user}
    password: ${DB_PASSWORD:change_me}
    hikari:
      pool-name: AnimeRecordHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:3000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-at-least-32-characters}
    expire-hours: ${JWT_EXPIRE_HOURS:24}
  file:
    upload-dir: ${UPLOAD_DIR:uploads}
    public-prefix: /uploads
  mail:
    from: ${MAIL_FROM:}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-no-trace}] [%thread] %logger{36} - %msg%n"
  level:
    com.example.aiserver: ${APP_LOG_LEVEL:INFO}
    com.zaxxer.hikari: ${HIKARI_LOG_LEVEL:INFO}
